<!DOCTYPE html>

<head>

<script>(function(){try{var p=localStorage.getItem('refl-palette')||'bone';document.documentElement.dataset.palette=p;var h=localStorage.getItem('refl-toc-hover');if(h)document.documentElement.dataset.tocHover=h;}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<body>

<main id="screen-reading">

  <header class="reading-header">
    <div class="reading-header-inner">
      <div class="reading-header-row">
        <div class="left">
          <a href="chapters.html" class="back-btn">Contents</a>
        </div>
        <div class="center">
          <span class="reading-chapter-num" id="reading-chapter-num"></span>
